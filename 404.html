<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="X-Frame-Options" content="DENY">
  <meta name="robots" content="noindex, nofollow">
  <title>404 — Seite nicht gefunden | addus.</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', -apple-system, sans-serif; background: #0D1117; color: #E6EDF3; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; text-align: center; }
    .wrap { max-width: 480px; }
    .code { font-size: 6rem; font-weight: 800; color: #C8932A; line-height: 1; margin-bottom: 1rem; letter-spacing: -0.05em; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.75rem; }
    p { color: #94A3B8; line-height: 1.6; margin-bottom: 2rem; }
    a { display: inline-block; background: #C8932A; color: #000; font-weight: 700; padding: 0.75rem 2rem; border-radius: 8px; text-decoration: none; transition: background 0.2s; }
    a:hover { background: #E0A840; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="code">404</div>
    <h1>Seite nicht gefunden.</h1>
    <p>Die gesuchte Seite existiert nicht oder wurde verschoben. Kein Problem — wir bringen Sie zurück.</p>
    <a href="https://addus-web.de/">Zur Startseite →</a>
  </div>
</body>
</html>
